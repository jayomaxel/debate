services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db.local
    image: debate-db:local
    container_name: aidebate-db
    environment:
      POSTGRES_DB: debate_system
      POSTGRES_USER: pgvector
      POSTGRES_PASSWORD: pgvector
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgvector -d debate_system"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aidebate-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: debate-api:local
    container_name: aidebate-api
    environment:
      DEBUG: "false"
      DATABASE_URL: postgresql://pgvector:pgvector@db:5432/debate_system
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_PASSWORD: ""
      SECRET_KEY: local-delivery-secret-key
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
    command: >
      sh -c "alembic upgrade head &&
      uvicorn main:app --host 0.0.0.0 --port 7860"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:7860:7860"
    volumes:
      - ./api/logs:/app/logs
      - ./api/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: debate-web:local
    container_name: aidebate-web
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-api:7860}
    depends_on:
      api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8860:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
